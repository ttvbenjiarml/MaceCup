mysql:
  jdbc-url: jdbc:mysql://127.0.0.1:3306/macecup?useSSL=false&allowPublicKeyRetrieval=true
  username: macecup
  password: ''
  login-timeout-seconds: 2
  retry-cooldown-seconds: 60
redis:
  host: 127.0.0.1
  port: 6379
  timeout-millis: 1000
performance:
  enabled: true
  monitor-interval-ticks: 100
  dynamic-view-distance:
    enabled: true
    high:
      view: 6
      simulation: 4
    medium:
      view: 5
      simulation: 3
    low:
      view: 4
      simulation: 3
    critical:
      view: 3
      simulation: 2
  item-cleanup:
    enabled: true
    max-items-per-world: 80
    skip-empty-worlds: true
  world-defaults:
    enabled: true
    do-mob-spawning: false
    do-fire-tick: false
    random-tick-speed: 0
  memory-trim-every-runs: 0
scoreboard:
  update-ticks: 40
bossbar:
  update-ticks: 20
practice:
  max-bots: 24
cosmetics:
  event-servers-enabled: false
custom-emotes:
  require-approval: true
  cooldown-seconds: 8
  max-length: 96
  blacklist:
  - slur
  - badword
map:
  generate-default-worlds: true
  event-width: 1250
  event-depth: 1250
  event-profile: crystal-rift



self-test-on-start: false
